name: Fetch My Tweets

on:
  schedule:
    # 毎週月曜 00:30 UTC (= 月曜 09:30 JST)。蓄積を最新化する。
    - cron: "30 0 * * 1"
  workflow_dispatch: {}   # 初回・手動実行はここから

permissions:
  contents: write          # 取得結果(JSON)をリポジトリにコミットするため

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      X_USERNAME: moo_stock          # 分析対象アカウント（@なし）
      FETCH_WINDOW_DAYS: "30"        # 初回は直近30日。広げたい時はここを増やす
      CHUNK_DAYS: "7"                # 取得を7日区切りで回す
      TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch tweets
        run: python scripts/fetch_my_tweets.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tweet_history.json
          git diff --staged --quiet || git commit -m "Update tweet history [skip ci]"
          git push
